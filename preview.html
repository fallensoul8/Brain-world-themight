<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agentshire Preview</title>
  <link rel="icon" href="/src/assets/logo.png" />
  <link rel="stylesheet" href="/src/styles/editor.css" />
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #preview-container { width: 100vw; height: 100vh; position: relative; }
    #preview-loading {
      position: absolute; inset: 0; z-index: 1000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #0a0e14; color: #fff; font-family: system-ui, sans-serif; gap: 12px;
    }
    #preview-loading .loading-spinner {
      width: 32px; height: 32px; border: 3px solid rgba(0,212,255,0.2);
      border-top-color: #00d4ff; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg) } }
    #preview-loading .loading-text { font-size: 14px; color: rgba(255,255,255,0.6); }
    #preview-error {
      display: none; position: absolute; inset: 0; z-index: 1001;
      flex-direction: column; align-items: center; justify-content: center;
      background: #0a0e14; color: #ff4466; font-family: system-ui, sans-serif; gap: 12px;
    }
    #preview-error button {
      background: rgba(0,212,255,0.15); border: 1px solid rgba(0,212,255,0.3);
      color: #00d4ff; padding: 8px 20px; border-radius: 6px; cursor: pointer; font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="preview-container">
    <div id="preview-loading">
      <div class="loading-spinner"></div>
      <div class="loading-text" data-i18n="editor.preview_loading">正在加载预览...</div>
    </div>
    <div id="preview-error">
      <div style="font-size: 16px;" data-i18n="editor.preview_fail">预览加载失败</div>
      <div id="preview-error-msg" style="font-size: 13px; color: rgba(255,255,255,0.5);"></div>
      <button onclick="window.close()" data-i18n="editor.close_window">关闭窗口</button>
    </div>
  </div>

  <script type="module" src="/src/editor/preview-main.ts"></script>
</body>
</html>
